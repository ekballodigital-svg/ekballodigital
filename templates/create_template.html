{% extends "base.html" %}

{% block content %}

<h2>Criar Template WhatsApp</h2>

<div class="form-container">

<label>Tipo de mensagem</label>
<select id="type">
<option value="">Escolha</option>
<option value="MARKETING">Marketing</option>
<option value="UTILITY">Utility</option>
<option value="AUTHENTICATION">Authentication</option>
</select>

<label>Nome do template</label>
<input id="name" placeholder="promo_template">

<label>Idioma</label>
<select id="language">
<option value="pt_BR">Português (Brasil)</option>
<option value="en_US">English</option>
<option value="es_ES">Español</option>
</select>

<label>Categoria</label>
<select id="category">
<option value="MARKETING">Marketing</option>
<option value="UTILITY">Utility</option>
<option value="AUTHENTICATION">Authentication</option>
</select>

<label>Cabeçalho (opcional)</label>
<input id="header" placeholder="Promoção especial">

<label>Mensagem</label>
<textarea id="message" placeholder="Olá {{1}}, sua compra foi confirmada"></textarea>

<label>Botão (opcional)</label>
<input id="button" placeholder="https://seusite.com">

<button onclick="criar()">
Criar Template
</button>

</div>

<h3>Resposta da API</h3>

<pre id="resposta"></pre>

<script>

async function criar(){

const type = document.getElementById("type").value
const name = document.getElementById("name").value
const language = document.getElementById("language").value
const category = document.getElementById("category").value
const header = document.getElementById("header").value
const message = document.getElementById("message").value
const button = document.getElementById("button").value

const response = await fetch("/create-template-api",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
type,
name,
language,
category,
header,
message,
button
})
})

const data = await response.json()

document.getElementById("resposta").innerText =
JSON.stringify(data,null,2)

}

</script>

{% endblock %}
