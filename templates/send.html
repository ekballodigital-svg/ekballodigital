{% extends "base.html" %}

{% block content %}

<h2>Enviar Template WhatsApp</h2>

<div class="form-container">

<label>Número</label>
<input id="numero" placeholder="551199999999">

<label>Escolher Template</label>

<select id="template" onchange="previewTemplate()">
<option value="">Carregando templates...</option>
</select>

<div class="preview-box">

<h4>Preview da Mensagem</h4>

<div id="preview-msg">
Selecione um template
</div>

</div>

<button onclick="enviar()">
Enviar Template
</button>

</div>

<h4 class="mt-4">Resposta do servidor</h4>

<pre id="resposta"></pre>

<script>

let templates = {}

async function carregarTemplates(){

const response = await fetch("/get-templates")
const data = await response.json()

const select = document.getElementById("template")

select.innerHTML = '<option value="">Selecione</option>'

data.data.forEach(t => {

let body = ""

t.components.forEach(c => {
if(c.type === "BODY"){
body = c.text
}
})

templates[t.name] = body

const option = document.createElement("option")
option.value = t.name
option.text = t.name

select.appendChild(option)

})

}

function previewTemplate(){

const template = document.getElementById("template").value

document.getElementById("preview-msg").innerText =
templates[template] || "Selecione um template"

}

async function enviar(){

const numero = document.getElementById("numero").value
const template = document.getElementById("template").value

const response = await fetch("/send-template",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero:numero,
template:template
})

})

const data = await response.json()

document.getElementById("resposta").innerText =
JSON.stringify(data,null,2)

}

carregarTemplates()

</script>

{% endblock %}
